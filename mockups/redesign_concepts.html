<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RetailMate 리디자인 시안</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#eef1f6; color:#0f172a; padding:28px 16px 80px; }
  h1 { font-size:24px; text-align:center; margin-bottom:4px; }
  .sub { text-align:center; color:#64748b; margin-bottom:28px; font-size:14px; }
  .lane { max-width:1180px; margin:0 auto 56px; }
  .lane-h { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .lane-h .dot { width:14px; height:14px; border-radius:50%; }
  .lane-h h2 { font-size:19px; }
  .lane-h .tag { font-size:12px; color:#64748b; }
  .lane-desc { color:#475569; font-size:13px; margin-bottom:16px; }
  .frames { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  /* phone frame */
  .phone { width:300px; height:620px; border-radius:36px; padding:12px; background:#0b1220; box-shadow:0 18px 50px rgba(2,6,23,.28); flex:0 0 auto; }
  .phone .screen { width:100%; height:100%; border-radius:26px; overflow:hidden; position:relative; }
  /* pc frame */
  .pc { flex:1 1 560px; min-width:520px; border-radius:16px; overflow:hidden; box-shadow:0 18px 50px rgba(2,6,23,.18); border:1px solid #dbe1ea; }
  .pc .bar { height:34px; background:#e2e8f0; display:flex; align-items:center; gap:6px; padding:0 12px; }
  .pc .bar i { width:11px; height:11px; border-radius:50%; background:#cbd5e1; }
  .pc .body { height:560px; overflow:hidden; }
  .label { font-size:12px; color:#94a3b8; margin:8px 2px 0; text-align:center; }

  /* ====== Generic UI atoms (themed via vars) ====== */
  .scr { height:100%; display:flex; flex-direction:column; }
  .topbar { padding:16px 16px 10px; display:flex; align-items:center; justify-content:space-between; }
  .topbar .store { font-weight:700; font-size:15px; }
  .topbar .ava { width:30px;height:30px;border-radius:50%; background:#cbd5e1; }
  .content { flex:1; overflow:hidden; padding:4px 16px 16px; }
  .kpi-big { font-size:30px; font-weight:800; letter-spacing:-.5px; }
  .muted { color:var(--muted); font-size:12px; }
  .card { border-radius:18px; padding:16px; margin-bottom:12px; }
  .row { display:flex; gap:10px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .qa { border-radius:14px; padding:12px 8px; text-align:center; font-size:11px; font-weight:600; }
  .qa .ic { font-size:18px; display:block; margin-bottom:4px; }
  .cta { border-radius:14px; padding:14px; text-align:center; font-weight:700; font-size:15px; }
  .ai-line { display:flex; gap:10px; align-items:flex-start; border-radius:16px; padding:14px; }
  .spark { width:30px;height:30px;border-radius:10px; background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899); flex:0 0 auto; }
  /* bottom nav */
  .bnav { display:flex; justify-content:space-around; align-items:center; padding:8px 6px 14px; position:relative; }
  .bnav .it { font-size:10px; text-align:center; color:var(--muted); flex:1; }
  .bnav .it .ic { font-size:18px; display:block; }
  .fab { position:absolute; left:50%; top:-22px; transform:translateX(-50%); width:56px;height:56px;border-radius:50%;
         background:linear-gradient(135deg,#3b82f6,#8b5cf6,#ec4899); box-shadow:0 8px 22px rgba(99,102,241,.5);
         display:flex;align-items:center;justify-content:center; color:#fff; font-size:24px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { border-radius:999px; padding:6px 12px; font-size:12px; font-weight:600; }
  .moneyrow { display:flex; align-items:center; justify-content:space-between; border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .quickbtns { display:flex; gap:6px; }
  .quickbtns span { font-size:10px; border-radius:8px; padding:4px 8px; }

  /* ====== Theme A : Clean SaaS (light/blue) ====== */
  .A { --bg:#f6f8fc; --card:#ffffff; --muted:#94a3b8; --pri:#2563eb; --ink:#0f172a; background:var(--bg); color:var(--ink); }
  .A .card{ background:var(--card); box-shadow:0 2px 10px rgba(15,23,42,.05);}
  .A .qa{ background:#f1f5f9;} .A .qa .ic{color:var(--pri);}
  .A .cta{ background:var(--pri); color:#fff;}
  .A .ai-line{ background:#eef4ff;}
  .A .bnav{ background:#fff; border-top:1px solid #eef1f6;}
  .A .chip{ background:#eef4ff; color:var(--pri);}
  .A .moneyrow{ background:#f8fafc;}
  .A .quickbtns span{ background:#eef4ff; color:var(--pri);}
  .A .topbar{background:#fff;}

  /* ====== Theme B : Dark premium ====== */
  .B { --bg:#0b1220; --card:#141d2e; --muted:#64748b; --pri:#38bdf8; --ink:#e2e8f0; background:var(--bg); color:var(--ink); }
  .B .card{ background:linear-gradient(160deg,#16213a,#101827); border:1px solid #1e293b;}
  .B .qa{ background:#1a2336; color:#cbd5e1;} .B .qa .ic{color:var(--pri);}
  .B .cta{ background:linear-gradient(135deg,#0ea5e9,#6366f1); color:#fff;}
  .B .ai-line{ background:#15233b; border:1px solid #243049;}
  .B .bnav{ background:#0d1626; border-top:1px solid #1e293b;}
  .B .chip{ background:#15233b; color:var(--pri);}
  .B .moneyrow{ background:#111a2b;}
  .B .quickbtns span{ background:#15233b; color:var(--pri);}
  .B .topbar{background:transparent;}
  .B .kpi-big{ color:#fff;}

  /* ====== Theme C : Toss/minimal ====== */
  .C { --bg:#ffffff; --card:#ffffff; --muted:#9aa5b1; --pri:#1f6feb; --ink:#111418; background:var(--bg); color:var(--ink); }
  .C .card{ background:#fff; border:1px solid #f0f2f5;}
  .C .kpi-big{ font-size:34px;}
  .C .qa{ background:#f6f8fa;} .C .qa .ic{color:var(--pri);}
  .C .cta{ background:#1f6feb; color:#fff; border-radius:16px; padding:16px;}
  .C .ai-line{ background:#f3f7ff;}
  .C .bnav{ background:#fff; border-top:1px solid #f0f2f5;}
  .C .chip{ background:#f3f7ff; color:var(--pri);}
  .C .moneyrow{ background:#fff; border:1px solid #f0f2f5;}
  .C .quickbtns span{ background:#f3f7ff; color:var(--pri);}
  .C .topbar .store{font-size:18px;}
</style>
</head>
<body>
<h1>RetailMate 리디자인 시안</h1>
<div class="sub">3개 방향 × (모바일 홈 · 모바일 매출 빠른입력 · PC 대시보드) · 모바일 하단 중앙에 AI FAB 복구</div>

<!-- ============ LANE TEMPLATE via JS to avoid repetition ============ -->
<div id="lanes"></div>

<script>
const HOME = (t)=>`<div class="scr ${t}">
  <div class="topbar"><div class="store">행복분식 ▾</div><div class="ava"></div></div>
  <div class="content">
    <div class="card"><div class="muted">이달 매출</div><div class="kpi-big">₩ 12,480,000</div>
      <div class="muted" style="margin-top:4px;">목표 대비 78% · 영업이익률 23%</div></div>
    <div class="ai-line"><div class="spark"></div><div><b style="font-size:13px;">이번 주 카드 매출이 12% 늘었어요</b><div class="muted">배달 비중이 높아지는 추세예요. 자세히 보기 ›</div></div></div>
    <div class="cta">＋ 오늘 매출 입력</div>
    <div class="grid4" style="margin-top:12px;">
      <div class="qa"><span class="ic">💳</span>매출</div><div class="qa"><span class="ic">🧾</span>지출</div>
      <div class="qa"><span class="ic">⏰</span>근태</div><div class="qa"><span class="ic">📄</span>계약</div></div>
  </div>
  <div class="bnav"><div class="it"><span class="ic">🏠</span>홈</div><div class="it"><span class="ic">💳</span>매출</div>
    <div class="it"><div class="fab">✦</div></div><div class="it"><span class="ic">👥</span>직원</div><div class="it"><span class="ic">⋯</span>더보기</div></div>
</div>`;

const SALES = (t)=>`<div class="scr ${t}">
  <div class="topbar"><div class="store">오늘 매출 입력</div><div class="muted">5/31 (토)</div></div>
  <div class="content">
    <div class="chips" style="margin-bottom:12px;"><div class="chip">어제처럼 채우기</div><div class="chip">어제</div><div class="chip">오늘</div></div>
    <div class="moneyrow"><div><b>💳 카드</b></div><div style="text-align:right;"><b style="font-size:16px;">320,000</b><div class="quickbtns" style="margin-top:4px;"><span>+1만</span><span>+10만</span></div></div></div>
    <div class="moneyrow"><div><b>💵 현금</b></div><div style="text-align:right;"><b style="font-size:16px;">80,000</b><div class="quickbtns" style="margin-top:4px;"><span>+1만</span><span>+10만</span></div></div></div>
    <div class="moneyrow"><div><b>🛵 배달앱</b></div><div style="text-align:right;"><b style="font-size:16px;">150,000</b><div class="quickbtns" style="margin-top:4px;"><span>+1만</span><span>+10만</span></div></div></div>
    <div style="text-align:center; margin:6px 0;"><span class="chip">＋ 다른 결제수단</span></div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;"><span class="muted">합계</span><b style="font-size:20px;">₩ 550,000</b></div>
    <div class="cta">저장</div>
  </div>
  <div class="bnav"><div class="it"><span class="ic">🏠</span>홈</div><div class="it"><span class="ic">💳</span>매출</div>
    <div class="it"><div class="fab">✦</div></div><div class="it"><span class="ic">👥</span>직원</div><div class="it"><span class="ic">⋯</span>더보기</div></div>
</div>`;

const PC = (t)=>`<div class="scr ${t}" style="flex-direction:row;">
  <div style="width:190px; padding:18px 12px; border-right:1px solid rgba(148,163,184,.2);">
    <div style="font-weight:800; margin-bottom:18px;">RetailMate</div>
    ${['🏠 홈','💳 매출','🧾 지출','⏰ 근태','👥 직원','📄 계약','📢 공지','📊 리포트','✦ AI','⚙ 설정'].map((x,i)=>`<div style="padding:9px 10px; border-radius:10px; font-size:13px; margin-bottom:2px; ${i===0?'background:rgba(99,102,241,.14); font-weight:700;':''}">${x}</div>`).join('')}
  </div>
  <div style="flex:1; padding:20px; overflow:hidden;">
    <div class="topbar" style="padding:0 0 14px;"><div class="store">행복분식 · 대시보드</div><div class="ava"></div></div>
    <div class="row" style="margin-bottom:12px;">
      <div class="card" style="flex:1;"><div class="muted">이달 매출</div><div class="kpi-big">₩12.48M</div></div>
      <div class="card" style="flex:1;"><div class="muted">영업이익</div><div class="kpi-big">₩2.87M</div></div>
      <div class="card" style="flex:1;"><div class="muted">목표 달성</div><div class="kpi-big">78%</div></div>
    </div>
    <div class="row">
      <div class="card" style="flex:2; height:180px;"><b style="font-size:13px;">일별 매출 추이</b>
        <svg viewBox="0 0 300 110" style="width:100%;height:140px;margin-top:6px;"><polyline points="0,90 40,70 80,80 120,50 160,60 200,35 240,45 300,20" fill="none" stroke="${t==='B'?'#38bdf8':'#2563eb'}" stroke-width="3"/></svg></div>
      <div class="card" style="flex:1;"><div class="ai-line" style="margin:0;"><div class="spark"></div><div><b style="font-size:12px;">AI 인사이트</b><div class="muted" style="font-size:11px;">주말 매출이 평일 대비 1.6배. 인력 보강을 고려해보세요.</div></div></div></div>
    </div>
  </div>
</div>`;

const lanes = [
  {k:'A', color:'#2563eb', name:'시안 A — 클린 SaaS', tag:'안전·정석', desc:'라이트 배경 + 카드. 좌측 아이콘 레일(PC), 모바일 하단탭+중앙 AI FAB. 기존 자산 재활용 최대, 빠른 적용.'},
  {k:'B', color:'#38bdf8', name:'시안 B — 다크 프리미엄', tag:'데이터 중심', desc:'다크 네이비 + 네온 포인트, 글래스 카드. 큰 KPI·차트, AI 오브와 조화. 세련된 인상.'},
  {k:'C', color:'#1f6feb', name:'시안 C — 토스/뱅킹 스타일', tag:'초간결·모바일 극대화', desc:'흰 배경·굵은 타이포·한 화면 한 동작. 큰 버튼/리스트, 입력 최소 탭. 비개발자에게 가장 직관적.'},
];
document.getElementById('lanes').innerHTML = lanes.map(L=>`
  <div class="lane">
    <div class="lane-h"><span class="dot" style="background:${L.color}"></span><h2>${L.name}</h2><span class="tag">· ${L.tag}</span></div>
    <div class="lane-desc">${L.desc}</div>
    <div class="frames">
      <div><div class="phone"><div class="screen">${HOME(L.k)}</div></div><div class="label">모바일 · 홈 (AI FAB)</div></div>
      <div><div class="phone"><div class="screen">${SALES(L.k)}</div></div><div class="label">모바일 · 매출 빠른입력</div></div>
      <div class="pc"><div class="bar"><i></i><i></i><i></i></div><div class="body">${PC(L.k)}</div></div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
